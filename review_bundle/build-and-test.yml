name: Build and Test (Lazarus + FPC)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  default:
    name: Windows / Default Build and Tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lazarus via Chocolatey
        shell: pwsh
        run: |
          choco install -y lazarus
          refreshenv

      - name: Set stable terminal width
        shell: pwsh
        run: |
          echo "COLUMNS=80" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append


      - name: Show versions
        shell: pwsh
        run: |
          lazbuild --version
          fpc -iV

      - name: Sync settings.inc (single source -> release)
        shell: cmd
        run: |
          call scripts\sync_settings_inc.bat


      - name: Verify settings.inc synced
        shell: pwsh
        run: |
          $src = "src/fafafa.core.settings.inc"
          $dst = "release/src/fafafa.core.settings.inc"
          if (-not (Test-Path $dst)) { Write-Error "Missing $dst"; exit 1 }
          if ((Get-FileHash $src).Hash -ne (Get-FileHash $dst).Hash) { Write-Error "settings.inc not synced"; exit 1 }


      - name: Build tests with lazbuild
        shell: pwsh
        run: |
          lazbuild -B tests/fafafa.core.socket.poller/fafafa.core.socket.poller.test.lpi

      - name: Run tests
        shell: pwsh
        run: |
          tests/fafafa.core.socket.poller/bin/fafafa_core_socket_poller_test.exe --all --format=plain

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            tests/fafafa.core.socket.poller/bin/**
            tests/fafafa/**

  experimental:
    name: Windows / Experimental Pollers (macro)
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lazarus via Chocolatey
        shell: pwsh
        run: |
          choco install -y lazarus
          refreshenv

      - name: Build tests with experimental macro
        shell: pwsh
        run: |
          lazbuild -B tests/fafafa.core.socket.poller/fafafa.core.socket.poller.test.lpi --compiler-options=-dFAFAFA_SOCKET_POLLER_EXPERIMENTAL

      - name: Run tests (experimental)
        shell: pwsh
        run: |
          tests/fafafa.core.socket.poller/bin/fafafa_core_socket_poller_test.exe --all --format=plain

      - name: Upload experimental artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experimental-artifacts
          path: |
            tests/fafafa.core.socket.poller/bin/**
            tests/fafafa/**

