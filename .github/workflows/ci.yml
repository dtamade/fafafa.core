# fafafa.core CI - 跨平台 SIMD 测试
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  FPC_VERSION: "3.2.2"

jobs:
  # x86_64 Linux 测试 (SSE2/AVX2/AVX-512)
  test-linux-x64:
    runs-on: ubuntu-latest
    name: Linux x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc lazarus

      - name: Build SIMD Tests
        run: |
          cd tests/fafafa.core.simd
          lazbuild fafafa.core.simd.test.lpi

      - name: Run Tests
        run: |
          ./tests/fafafa.core.simd/bin/fafafa.core.simd.test --all
      - name: Check Memory Leaks
        run: |
          # HeapTrc 已在测试中启用，检查输出是否有泄漏
          ./tests/fafafa.core.simd/bin/fafafa.core.simd.test --all 2>&1 | grep -q "0 unfreed memory blocks" || exit 1

  # x86_64 Linux - fafafa.core.os
  test-linux-os-x64:
    runs-on: ubuntu-latest
    name: Linux x86_64 (fafafa.core.os)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal + Lazarus
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc lazarus

      - name: Build fafafa.core.os tests
        run: |
          cd tests/fafafa.core.os
          lazbuild fafafa.core.os.test.lpi

      - name: Run fafafa.core.os tests
        run: |
          ./tests/fafafa.core.os/bin/tests_os --all --format=plain | tee tests/fafafa.core.os/bin/tests_os.log

      - name: Upload fafafa.core.os artifacts (linux-x64)
        uses: actions/upload-artifact@v4
        with:
          name: tests_os-linux-x64
          path: |
            tests/fafafa.core.os/bin/tests_os
            tests/fafafa.core.os/bin/tests_os.log

  # ARM64 Linux 测试 (NEON)
  test-linux-arm64:
    runs-on: ubuntu-latest
    name: Linux ARM64 (QEMU)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and Test in ARM64 Container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/debian:bookworm \
            bash -c "
              apt-get update && apt-get install -y fpc lazarus-ide-gtk2 make
              cd tests/fafafa.core.simd
              lazbuild fafafa.core.simd.test.lpi || (cat ~/.lazarus/compilertest.log 2>/dev/null; exit 1)
              ./bin/fafafa.core.simd.test --all
            "

      - name: Upload fafafa.core.os artifacts (linux-arm64)
        uses: actions/upload-artifact@v4
        with:
          name: tests_os-linux-arm64
          path: |
            tests/fafafa.core.os/bin/tests_os
            tests/fafafa.core.os/bin/tests_os.log

  # ARM64 Linux - fafafa.core.os (QEMU)
  test-linux-os-arm64:
    runs-on: ubuntu-latest
    name: Linux ARM64 (fafafa.core.os, QEMU)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and Test in ARM64 Container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/debian:bookworm \
            bash -c "\
              apt-get update && apt-get install -y fpc lazarus-ide-gtk2 make \
              cd tests/fafafa.core.os \
              lazbuild fafafa.core.os.test.lpi || (cat ~/.lazarus/compilertest.log 2>/dev/null; exit 1) \
              ./bin/tests_os --all --format=plain | tee /workspace/tests/fafafa.core.os/bin/tests_os.log \
            "

  # Windows x86_64 测试
  test-windows-x64:
    runs-on: windows-latest
    name: Windows x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          choco install freepascal lazarus --yes

      - name: Build SIMD Tests
        shell: cmd
        run: |
          cd tests\fafafa.core.simd
          lazbuild fafafa.core.simd.test.lpi

      - name: Run Tests
        shell: cmd
        run: |
          tests\fafafa.core.simd\bin\fafafa.core.simd.test.exe --all

  # Windows x86_64 - fafafa.core.os
  test-windows-os-x64:
    runs-on: windows-latest
    name: Windows x86_64 (fafafa.core.os)
    continue-on-error: true  # Windows Lazarus setup may vary; keep non-blocking

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          choco install freepascal lazarus --yes

      - name: Build fafafa.core.os tests
        shell: cmd
        run: |
          cd tests\\fafafa.core.os
          lazbuild fafafa.core.os.test.lpi

      - name: Run fafafa.core.os tests
        shell: cmd
        run: |
          tests\\fafafa.core.os\\bin\\tests_os.exe --all --format=plain > tests\\fafafa.core.os\\bin\\tests_os.log

      - name: Note soft failure reason (Windows toolchain)
        if: failure()
        run: echo "Soft fail: Windows Lazarus/FPC toolchain may be unavailable; see tests_os.log artifact."

      - name: Upload fafafa.core.os artifacts (windows-x64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests_os-windows-x64
          path: |
            tests/fafafa.core.os/bin/tests_os.exe
            tests/fafafa.core.os/bin/tests_os.log

  # macOS x86_64 测试
  test-macos-x64:
    runs-on: macos-13
    name: macOS x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          brew install fpc

      - name: Build SIMD Tests
        run: |
          cd tests/fafafa.core.simd
          # macOS 可能需要指定 SDK 路径
          lazbuild fafafa.core.simd.test.lpi || true

      - name: Run Tests
        run: |
          ./tests/fafafa.core.simd/bin/fafafa.core.simd.test --all || true

  # macOS ARM64 - fafafa.core.os
  test-macos-os-arm64:
    runs-on: macos-14
    name: macOS ARM64 (fafafa.core.os)
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          brew install fpc

      - name: Build fafafa.core.os tests
        run: |
          cd tests/fafafa.core.os
          lazbuild fafafa.core.os.test.lpi || true

      - name: Run fafafa.core.os tests
        run: |
          ./tests/fafafa.core.os/bin/tests_os --all --format=plain | tee tests/fafafa.core.os/bin/tests_os.log || true

      - name: Note soft failure reason (macOS toolchain)
        if: failure()
        run: echo "Soft fail: macOS Lazarus/FPC toolchain may be partial; see tests_os.log artifact."

      - name: Upload fafafa.core.os artifacts (macos-arm64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests_os-macos-arm64
          path: |
            tests/fafafa.core.os/bin/tests_os
            tests/fafafa.core.os/bin/tests_os.log

  # macOS x86_64 - fafafa.core.os
  test-macos-os-x64:
    runs-on: macos-13
    name: macOS x86_64 (fafafa.core.os)
    continue-on-error: true  # macOS Lazarus packaging may differ; keep soft

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          brew install fpc

      - name: Build fafafa.core.os tests
        run: |
          cd tests/fafafa.core.os
          lazbuild fafafa.core.os.test.lpi || true

      - name: Run fafafa.core.os tests
        run: |
          ./tests/fafafa.core.os/bin/tests_os --all --format=plain | tee tests/fafafa.core.os/bin/tests_os.log || true

      - name: Note soft failure reason (macOS toolchain)
        if: failure()
        run: echo "Soft fail: macOS Lazarus/FPC toolchain may be partial; see tests_os.log artifact."

      - name: Upload fafafa.core.os artifacts (macos-x64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests_os-macos-x64
          path: |
            tests/fafafa.core.os/bin/tests_os
            tests/fafafa.core.os/bin/tests_os.log

  # macOS ARM64 测试 (Apple Silicon)
  test-macos-arm64:
    runs-on: macos-14
    name: macOS ARM64 (Apple Silicon)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          brew install fpc

      - name: Build SIMD Tests
        run: |
          cd tests/fafafa.core.simd
          lazbuild fafafa.core.simd.test.lpi || true

      - name: Run Tests
        run: |
          ./tests/fafafa.core.simd/bin/fafafa.core.simd.test --all || true

  # 性能回归检测
  benchmark:
    runs-on: ubuntu-latest
    name: Performance Benchmark
    needs: [test-linux-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc lazarus

      - name: Build SIMD Tests
        run: |
          cd tests/fafafa.core.simd
          lazbuild fafafa.core.simd.test.lpi

      - name: Build FS Tests
        run: |
          cd tests/fafafa.core.fs
          lazbuild tests_fs.lpi

      - name: Run SIMD Benchmark
        run: |
          ./tests/fafafa.core.simd/bin/fafafa.core.simd.test --all 2>&1 | tee benchmark-simd.log

      - name: Run FS Benchmark
        run: |
          ./tests/fafafa.core.fs/bin/tests_fs --suite=TTestTreeIntegration --format=plain 2>&1 | tee benchmark-fs.log

      - name: Extract Performance Metrics
        run: |
          echo "## Performance Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SIMD Performance" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 2 "MemEqual:\|SumBytes:\|CountByte:" benchmark-simd.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### FS Tree Operations" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "Test_\|Time:" benchmark-fs.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Memory Safety" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "unfreed memory blocks" benchmark-fs.log >> $GITHUB_STEP_SUMMARY || echo "No heap trace" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-simd.log
            benchmark-fs.log
