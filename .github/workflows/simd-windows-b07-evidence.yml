name: SIMD Windows B07 Evidence

on:
  workflow_dispatch:

jobs:
  prepare-windows-b07-source:
    runs-on: ubuntu-latest
    name: Prepare Windows SIMD Source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage SIMD source subset
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          STAGE="${RUNNER_TEMP}/simd-windows-b07-source"

          rm -rf "${STAGE}"
          mkdir -p "${STAGE}/tests"

          cp -a "${ROOT}/src" "${STAGE}/"
          cp -a "${ROOT}/docs" "${STAGE}/"
          cp -a "${ROOT}/tests/fafafa.core.simd" "${STAGE}/tests/"
          cp -a "${ROOT}/tests/fafafa.core.simd.cpuinfo" "${STAGE}/tests/"
          cp -a "${ROOT}/tests/fafafa.core.simd.cpuinfo.x86" "${STAGE}/tests/"
          if [[ -d "${ROOT}/tests/fafafa.core.simd.intrinsics.experimental" ]]; then
            cp -a "${ROOT}/tests/fafafa.core.simd.intrinsics.experimental" "${STAGE}/tests/"
          fi
          cp "${ROOT}/tests/run_all_tests.bat" "${STAGE}/tests/"

      - name: Upload staged SIMD source
        uses: actions/upload-artifact@v4
        with:
          name: simd-windows-b07-source
          if-no-files-found: error
          retention-days: 1
          path: ${{ runner.temp }}/simd-windows-b07-source

  collect-windows-b07-evidence:
    needs: prepare-windows-b07-source
    runs-on: windows-latest
    name: Collect Windows B07 Evidence

    steps:
      - name: Download prepared SIMD source
        uses: actions/download-artifact@v4
        with:
          name: simd-windows-b07-source
          path: ${{ github.workspace }}

      - name: Install FreePascal + Lazarus
        run: |
          choco install freepascal lazarus --yes

      - name: Collect and Verify Windows Evidence
        shell: cmd
        run: |
          echo [DEBUG] workspace=%GITHUB_WORKSPACE%
          dir tests
          dir tests\fafafa.core.simd
          call "%GITHUB_WORKSPACE%\tests\fafafa.core.simd\buildOrTest.bat" evidence-win-verify

      - name: Upload Windows Evidence Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simd-windows-b07-evidence
          if-no-files-found: error
          retention-days: 7
          path: |
            tests/fafafa.core.simd/logs/windows_b07_gate.log
            tests/fafafa.core.simd/logs/gate_summary.md
            tests/fafafa.core.simd/logs/build.txt
            tests/fafafa.core.simd/logs/test.txt
            tests/run_all_tests_summary.txt
