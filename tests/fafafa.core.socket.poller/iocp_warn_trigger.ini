; IOCP warn trigger test configuration (used only in Windows + DEBUG + FAFAFA_SOCKET_POLLER_EXPERIMENTAL)
; Place this file next to the test binary (tests\fafafa.core.socket.poller\bin) to override defaults.
; Fallback path: tests\fafafa.core.socket.poller\iocp_warn_trigger.ini

[IOCP_WARN]
; Number of register/unregister loops to amplify CancelIoEx completions
loops=10

; Wait time in milliseconds for worker threads to drain cancel completions
wait_ms=50

; Enable weak assertion of warning thresholds (true/false)
; When true, the test asserts that cancel% >= 50 or fail% >= 30 in the summary
weak_assert=false

[IOCP_LOG]
; Runtime verbose logs without recompiling (default false)
verbose=false

[IOCP_PENDING_DEMO]
; Whether to enable the pending demo test's output (default false)
enabled=false
; Optional tag text printed in pending logs
tag=PendingDemo

[IOCP_WRITE]
; Max pending zero-sends per handle (default 1)
max_pending_zero_sends=1
; Backoff milliseconds when exceeding pending threshold (default 0)
backoff_ms=0
; WARN when p95 latency exceeds this (ms). 0 disables WARN.
warn_p95_ms=0

[IOCP_WRITE_DEMO]
; Enable write demo that uses WSASend(0) to trigger seWrite (default false)
enabled=false
; Number of zero-sends to queue (default 1)
queue_n=1

